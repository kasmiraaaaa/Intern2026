<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking</title>
</head>
<body>

<h2>Movie Ticket Booking</h2>

<form>

  Full Name:<br>
  <input type="text" name="fullname"><br><br>

  Email Address:<br>
  <input type="email" name="email"><br><br>

  Phone Number:<br>
  <input type="tel" name="phone"><br><br>

  Select Movie:<br>
  <select name="movie">
    <option>Avengers</option>
    <option>Inception</option>
    <option>Dune</option>
  </select><br><br>

  Select Date:<br>
  <input type="date" name="date"><br><br>

  Select Show Time:<br>
  <select name="showtime">
    <option>10:00 AM</option>
    <option>1:00 PM</option>
    <option>7:00 PM</option>
  </select><br><br>

  Number of Tickets:<br>
  <input type="number" name="tickets" min="1" max="10"><br><br>

  Seat Type:<br>
  <input type="radio" name="seat" value="Regular"> Regular<br>
  <input type="radio" name="seat" value="VIP"> VIP<br>
  <input type="radio" name="seat" value="Premium"> Premium<br><br>

  Food Options:<br>
  <input type="checkbox" name="food" value="Popcorn"> Popcorn<br>
  <input type="checkbox" name="food" value="Cold Drink"> Cold Drink<br>
  <input type="checkbox" name="food" value="Nachos"> Nachos<br><br>

  Special Request:<br>
  <textarea rows="4" cols="40" name="request"></textarea><br><br>

  <input type="submit" value="Book Tickets">
  <input type="reset" value="Reset">

</form>

</body>
</html>
